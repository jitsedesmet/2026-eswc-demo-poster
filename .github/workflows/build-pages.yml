name: Build Pages

on:
  workflow_call:
    inputs:
      deploy:
        required: true
        type: boolean
        default: false
  push:
  pull_request:

permissions:
  contents: read
  pages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm i

      - name: Build artifact
        run: npm run build

      - name: Generate PDF 📄
        run: npm run build-pdf

      - name: Setup Pages
        if: ${{ inputs.deploy == true }}
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: ${{ inputs.deploy == true }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'
