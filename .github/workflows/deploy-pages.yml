name: Deploy Pages


concurrency:
  group: 'pages'
  cancel-in-progress: true

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-pages:
    uses: ./.github/workflows/build-pages.yml
    with:
      deploy: true
    permissions:
      contents: read
      pages: write
      id-token: write

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
