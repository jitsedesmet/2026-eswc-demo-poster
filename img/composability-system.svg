<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="293" height="193" viewBox="0 0 293 193" role="img" aria-label="Language tooling composability diagram">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#005eae"/>
    </marker>
    <style>
      .box{fill:#fff;stroke:#005eae;stroke-width:3;rx:8;ry:8}
      .mid{fill:#eef4fb;stroke:#005eae;stroke-width:3;rx:10;ry:10}
      .txt{font-family:Inter,Arial,sans-serif;font-size:11px;fill:#003f76;font-weight:600}
      .sub{font-family:Inter,Arial,sans-serif;font-size:10px;fill:#003f76}
      .link{stroke:#005eae;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect class="box" x="8" y="12" width="85" height="36"/>
  <text class="txt" x="50.5" y="28" text-anchor="middle">SPARQL 1.1</text>
  <text class="sub" x="50.5" y="40" text-anchor="middle">base rules</text>

  <rect class="box" x="104" y="12" width="85" height="36"/>
  <text class="txt" x="146.5" y="28" text-anchor="middle">SPARQL 1.2</text>
  <text class="sub" x="146.5" y="40" text-anchor="middle">delta rules</text>

  <rect class="box" x="200" y="12" width="85" height="36"/>
  <text class="txt" x="242.5" y="28" text-anchor="middle">Extensions</text>
  <text class="sub" x="242.5" y="40" text-anchor="middle">ADJUST, LATERAL</text>

  <rect class="mid" x="50" y="72" width="193" height="42"/>
  <text class="txt" x="146.5" y="90" text-anchor="middle">Traqula compositional builder</text>
  <text class="sub" x="146.5" y="103" text-anchor="middle">add / replace / remove named rules</text>

  <path class="link" d="M 50 49 L 98 72"/>
  <path class="link" d="M 146.5 49 L 146.5 72"/>
  <path class="link" d="M 242.5 49 L 195 72"/>

  <rect class="box" x="22" y="136" width="116" height="42"/>
  <text class="txt" x="80" y="154" text-anchor="middle">Generated language</text>
  <text class="sub" x="80" y="167" text-anchor="middle">parser + generator +</text>
  <text class="sub" x="80" y="178" text-anchor="middle">transformers</text>

  <rect class="box" x="154" y="136" width="116" height="42"/>
  <text class="txt" x="212" y="154" text-anchor="middle">Configuration view</text>
  <text class="sub" x="212" y="167" text-anchor="middle">shown live in</text>
  <text class="sub" x="212" y="178" text-anchor="middle">the web demo</text>

  <path class="link" d="M 118 114 L 89 136"/>
  <path class="link" d="M 175 114 L 204 136"/>
</svg>
