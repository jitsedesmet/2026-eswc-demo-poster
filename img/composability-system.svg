<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="293" height="193" viewBox="0 0 293 193" role="img" aria-label="Language tooling composability diagram">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#005eae"/>
    </marker>
  </defs>

  <!-- SPARQL 1.1 — white fill, blue border -->
  <rect x="8" y="10" width="78" height="36" rx="8" fill="white" stroke="#005eae" stroke-width="3.5"/>
  <text font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#003f76" x="47" y="26" text-anchor="middle">SPARQL 1.1</text>
  <text font-family="Inter,Arial,sans-serif" font-size="9" fill="#003f76" x="47" y="39" text-anchor="middle">base rules</text>

  <!-- +SPARQL 1.2 — amber fill/border -->
  <rect x="107.5" y="10" width="78" height="36" rx="8" fill="#fff7ea" stroke="#fbba64" stroke-width="3.5"/>
  <text font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#8a5a11" x="146.5" y="26" text-anchor="middle">+SPARQL 1.2</text>
  <text font-family="Inter,Arial,sans-serif" font-size="9" fill="#8a5a11" x="146.5" y="39" text-anchor="middle">26 new rules</text>

  <!-- +Extensions — amber fill/border -->
  <rect x="207" y="10" width="78" height="36" rx="8" fill="#fff7ea" stroke="#fbba64" stroke-width="3.5"/>
  <text font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#8a5a11" x="246" y="26" text-anchor="middle">+Extensions</text>
  <text font-family="Inter,Arial,sans-serif" font-size="9" fill="#8a5a11" x="246" y="39" text-anchor="middle">ADJUST · LATERAL</text>

  <!-- Converging arrows to Traqula Builder -->
  <line x1="47" y1="46" x2="90" y2="72" stroke="#005eae" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="146.5" y1="46" x2="146.5" y2="72" stroke="#005eae" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="246" y1="46" x2="202" y2="72" stroke="#005eae" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Traqula Builder box -->
  <rect x="47" y="72" width="199" height="44" rx="12" fill="#e8f2fb" stroke="#005eae" stroke-width="4"/>
  <text font-family="Inter,Arial,sans-serif" font-size="12" font-weight="700" fill="#003f76" x="146.5" y="91" text-anchor="middle">Traqula Builder</text>
  <text font-family="Inter,Arial,sans-serif" font-size="9" fill="#003f76" x="146.5" y="107" text-anchor="middle">name-based rule lookup &amp; composition</text>

  <!-- Diverging arrows to output boxes -->
  <line x1="93" y1="116" x2="65" y2="142" stroke="#005eae" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="146.5" y1="116" x2="146.5" y2="142" stroke="#005eae" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="116" x2="228" y2="142" stroke="#005eae" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Output: Parser -->
  <rect x="10" y="142" width="82" height="38" rx="8" fill="white" stroke="#005eae" stroke-width="3"/>
  <text font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#003f76" x="51" y="158" text-anchor="middle">Parser</text>
  <text font-family="Inter,Arial,sans-serif" font-size="9" fill="#003f76" x="51" y="171" text-anchor="middle">lexer + grammar</text>

  <!-- Output: Generator -->
  <rect x="107.5" y="142" width="78" height="38" rx="8" fill="white" stroke="#005eae" stroke-width="3"/>
  <text font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#003f76" x="146.5" y="158" text-anchor="middle">Generator</text>
  <text font-family="Inter,Arial,sans-serif" font-size="9" fill="#003f76" x="146.5" y="171" text-anchor="middle">AST → SPARQL text</text>

  <!-- Output: Transformers -->
  <rect x="200" y="142" width="82" height="38" rx="8" fill="white" stroke="#005eae" stroke-width="3"/>
  <text font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#003f76" x="241" y="158" text-anchor="middle">Transformers</text>
  <text font-family="Inter,Arial,sans-serif" font-size="9" fill="#003f76" x="241" y="171" text-anchor="middle">toAst &amp; fromAst</text>
</svg>
