<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="290" viewBox="0 0 220 290"
     role="img" aria-label="Architecture stack: feature toggles to Traqula Builder to Comunica Engine to RDF Data Sources">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#546a80"/>
    </marker>
    <linearGradient id="blue-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6fba"/>
      <stop offset="100%" stop-color="#005eae"/>
    </linearGradient>
    <linearGradient id="amber-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd080"/>
      <stop offset="100%" stop-color="#fbba64"/>
    </linearGradient>
    <filter id="sh" x="-8%" y="-15%" width="116%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000028"/>
    </filter>
  </defs>

  <!-- ── Layer 1: User / App ── -->
  <rect x="25" y="6" width="170" height="52" rx="8"
        fill="url(#blue-g)" stroke="#003d7a" stroke-width="2" filter="url(#sh)"/>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="12" font-weight="900"
        fill="white" x="110" y="26" text-anchor="middle">User / App</text>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="9"
        fill="rgba(255,255,255,0.85)" x="110" y="40" text-anchor="middle">feature toggles</text>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="8.5"
        fill="rgba(255,255,255,0.65)" x="110" y="52" text-anchor="middle">SPARQL 1.2 · ADJUST · LATERAL</text>

  <!-- Arrow 1 + label -->
  <path d="M 110 58 L 110 74"
        stroke="#546a80" stroke-width="2" fill="none"
        stroke-dasharray="4 2.5" marker-end="url(#arr)"/>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="8"
        fill="#546a80" x="114" y="70" dominant-baseline="middle">config</text>

  <!-- ── Layer 2: Traqula Builder ── -->
  <rect x="15" y="76" width="190" height="58" rx="8"
        fill="url(#amber-g)" stroke="#b86d00" stroke-width="2" filter="url(#sh)"/>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="12" font-weight="900"
        fill="#5a2e00" x="110" y="97" text-anchor="middle">Traqula Builder</text>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="9"
        fill="#6b3a00" x="110" y="111" text-anchor="middle">parser · generator · transformers</text>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="8.5"
        fill="#7a4a00" x="110" y="124" text-anchor="middle">named, composable rule-based tooling</text>
  <!-- Side label -->
  <text font-family="Inter Tight,Inter,sans-serif" font-size="7.5" font-weight="700"
        fill="#b86d00" x="7" y="105" text-anchor="middle"
        transform="rotate(-90 7 105)">language</text>

  <!-- Arrow 2 + label -->
  <path d="M 110 134 L 110 150"
        stroke="#546a80" stroke-width="2" fill="none"
        stroke-dasharray="4 2.5" marker-end="url(#arr)"/>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="8"
        fill="#546a80" x="114" y="146" dominant-baseline="middle">actors</text>

  <!-- ── Layer 3: Comunica Engine ── -->
  <rect x="15" y="152" width="190" height="58" rx="8"
        fill="white" stroke="#9c0510" stroke-width="2" filter="url(#sh)"/>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="12" font-weight="900"
        fill="#7f0010" x="110" y="173" text-anchor="middle">Comunica Engine</text>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="9"
        fill="#9c0510" x="110" y="187" text-anchor="middle">modular actor pipeline</text>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="8.5"
        fill="#b81020" x="110" y="200" text-anchor="middle">Components.js · aligned with parser</text>
  <!-- Side label -->
  <text font-family="Inter Tight,Inter,sans-serif" font-size="7.5" font-weight="700"
        fill="#9c0510" x="213" y="181" text-anchor="middle"
        transform="rotate(90 213 181)">query</text>

  <!-- Arrow 3 + label -->
  <path d="M 110 210 L 110 226"
        stroke="#546a80" stroke-width="2" fill="none"
        stroke-dasharray="4 2.5" marker-end="url(#arr)"/>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="8"
        fill="#546a80" x="114" y="222" dominant-baseline="middle">SPARQL</text>

  <!-- ── Layer 4: RDF Data Sources (trapezoid) ── -->
  <path d="M 5 228 L 215 228 L 200 278 L 20 278 Z"
        fill="#edfaf3" stroke="#1a7a40" stroke-width="2" filter="url(#sh)"/>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="12" font-weight="900"
        fill="#1a7a40" x="110" y="249" text-anchor="middle">RDF Data Sources</text>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="9"
        fill="#1a7a40" x="110" y="263" text-anchor="middle">SPARQL endpoints · RDF-over-HTTP</text>
  <text font-family="Inter Tight,Inter,sans-serif" font-size="8.5"
        fill="#2a8a50" x="110" y="274" text-anchor="middle">federated across the Web</text>
</svg>
